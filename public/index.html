<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Braindump</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#DA7B3B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- PIN Screen -->
  <div id="login-screen" class="screen">
    <div class="login-box">
      <h1>Braindump</h1>
      <p class="login-subtitle">Voer je PIN in om te beginnen</p>
      <input type="password" id="pin-input" inputmode="numeric" placeholder="PIN" maxlength="10" autocomplete="off">
      <button id="pin-submit">Unlock</button>
      <p id="pin-error" class="error hidden"></p>
    </div>
  </div>

  <!-- Main App -->
  <div id="app-screen" class="screen hidden">
    <div class="container">
      <!-- Tab navigation -->
      <nav class="tabs">
        <button class="tab active" data-tab="inbox">Braindump</button>
        <button class="tab" data-tab="overview">Overzicht</button>
        <button class="tab" data-tab="gep">GeP</button>
        <button class="tab" data-tab="shared">Anna / Bram</button>
        <button id="settings-btn" class="settings-btn" title="Instellingen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button id="logout-btn" class="settings-btn" title="Uitloggen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </nav>

      <!-- Inbox tab -->
      <div id="tab-inbox" class="tab-content active">
        <div class="inbox-header">
          <div class="header-meta" id="inbox-meta">Nog niet ververst</div>
          <button id="inbox-refresh-btn" class="refresh-btn" title="Ververs inbox">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
        </div>
        <div class="inbox-feed" id="inbox-feed">
          <div class="loading" id="inbox-loading">Laden...</div>
        </div>
        <div class="chat-input">
          <div class="composer">
            <div id="upload-preview" class="upload-preview hidden"></div>
            <textarea id="inbox-input" placeholder="Nieuw item..." autocomplete="off" rows="1"></textarea>
            <div class="composer-actions">
              <button id="attach-btn" class="attach-btn" title="Bestand toevoegen">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <div class="composer-right">
                <button id="mic-btn" class="mic-btn hidden" title="Spraak invoer">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
                <button id="inbox-send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Overview tab -->
      <div id="tab-overview" class="tab-content hidden">
        <div class="overview-header">
          <div class="category-tabs" id="category-tabs">
            <button class="cat-tab active" data-cat="alles">Alles</button>
            <button class="cat-tab" data-cat="werk">GEP</button>
            <button class="cat-tab" data-cat="fysiek">Fysiek</button>
            <button class="cat-tab" data-cat="code">Code</button>
            <button class="cat-tab" data-cat="persoonlijk">Persoonlijk</button>
            <button class="cat-tab" data-cat="someday">Someday</button>
          </div>
          <button id="sort-btn" class="refresh-btn" title="Sorteer op nieuwste">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
          </button>
          <button id="refresh-btn" class="refresh-btn" title="Ververs">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
        </div>
        <div class="header-meta page-meta" id="overview-meta">Nog niet ververst</div>
        <div class="overview-content" id="overview-content">
          <div class="loading" id="overview-loading">Laden...</div>
        </div>
      </div>

      <!-- GeP tab -->
      <div id="tab-gep" class="tab-content hidden">
        <div class="inbox-header">
          <div class="header-meta" id="gep-meta">Nog niet ververst</div>
          <button id="gep-refresh-btn" class="refresh-btn" title="Ververs GeP inbox">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
        </div>
        <div class="inbox-feed" id="gep-feed">
          <div class="loading" id="gep-loading">Laden...</div>
        </div>
        <div class="chat-input">
          <div class="composer">
            <textarea id="gep-input" placeholder="GeP item..." autocomplete="off" rows="1"></textarea>
            <div class="composer-actions">
              <div></div>
              <div class="composer-right">
                <button id="gep-send">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Shared tab -->
      <div id="tab-shared" class="tab-content hidden">
        <div class="inbox-header">
          <div class="header-meta" id="shared-meta">Nog niet ververst</div>
          <button id="shared-refresh-btn" class="refresh-btn" title="Ververs gedeelde lijst">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
        </div>
        <div class="inbox-feed" id="shared-feed">
          <div class="loading" id="shared-loading">Laden...</div>
        </div>
        <div class="chat-input">
          <div class="composer">
            <textarea id="shared-input" placeholder="Gedeeld item..." autocomplete="off" rows="1"></textarea>
            <div class="composer-actions">
              <div></div>
              <div class="composer-right">
                <button id="shared-send">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Install banner -->
  <div id="install-banner" class="install-banner hidden">
    <span>Installeer Braindump als app</span>
    <div class="install-actions">
      <button id="install-btn">Installeren</button>
      <button id="install-dismiss" class="dismiss">&times;</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Instellingen</h2>
        <button id="settings-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <label class="settings-label" for="groq-key-input">Groq API Key</label>
        <p class="settings-hint">Voor spraak-naar-tekst (Whisper). Haal een key op bij <a href="https://console.groq.com" target="_blank" rel="noopener">console.groq.com</a></p>
        <div class="settings-key-row">
          <input type="password" id="groq-key-input" placeholder="gsk_..." autocomplete="off">
          <button id="groq-key-save" class="settings-save-btn">Opslaan</button>
        </div>
        <p id="groq-key-status" class="settings-status hidden"></p>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*,.pdf,.doc,.docx,.txt" multiple hidden>
  <div id="lightbox"><img id="lightbox-img" src="" alt=""></div>
  <script src="/app.js"></script>
</body>
</html>
